<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Shipyard Nagar - Fixed Deposits</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-orange: #FF6B35;
            --gradient: linear-gradient(135deg, #FF6B35 0%, #FF8C42 50%, #FFA726 100%);
            --shadow: 0 8px 25px rgba(255, 107, 53, 0.15);
            --card-bg: rgba(255, 255, 255, 0.95);
            --success-green: #22c55e;
        }
        [data-theme="dark"] { --card-bg: rgba(45, 45, 45, 0.95); }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-bottom: 50px;
            margin: 0;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000"><polygon fill="%23ffffff10" points="0,1000 1000,0 1000,1000"/></svg>');
            pointer-events: none; z-index: -1;
        }
        .header-image {
            width: 100%; height: auto; max-height: 150px; object-fit: cover;
            position: fixed; top: 3mm; left: 0; z-index: 999;
        }
        .page-container { padding-top: 130px; padding-bottom: 20px; }
        
        /* Heading */
        .page-heading {
            text-align: center;
            color: white;
            font-weight: 600;
            margin-bottom: 20px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-size: 1.6rem;
        }
        
        /* Summary cards - three equal boxes */
        .summary-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 12px 10px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        .summary-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: space-between;
        }
        .stat-box {
            flex: 1;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 10px 6px;
            border-radius: 14px;
            text-align: center;
            border-left: 3px solid var(--primary-orange);
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        [data-theme="dark"] .stat-box { background: linear-gradient(135deg, #2d3748 0%, #4a5568 100%); color: #fff; }
        .stat-label { font-size: 0.7rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        [data-theme="dark"] .stat-label { color: #94a3b8; }
        .stat-value { font-size: 1.1rem; font-weight: 700; color: #1e293b; line-height: 1.2; }
        [data-theme="dark"] .stat-value { color: #f1f5f9; }

        /* FD List - slightly larger fonts */
        .fd-list { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
        .fd-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 14px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.2s;
        }
        .fd-card:hover { transform: translateY(-2px); }
        .fd-amount {
            font-size: 1.45rem;  /* ~10% bigger */
            font-weight: 700;
            color: var(--primary-orange);
            line-height: 1.2;
            margin-bottom: 4px;
        }
        .interest-line {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--success-green);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        .interest-line i { font-size: 0.7rem; }
        .fd-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.68rem;
            color: #6c757d;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 8px;
            margin-top: 6px;
        }
        [data-theme="dark"] .fd-meta { color: #adb7c4; border-top-color: rgba(255,255,255,0.1); }
        .fd-meta span { margin-right: 8px; }
        
        .admin-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        .admin-btn-sm {
            background: var(--gradient);
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            color: white;
            font-weight: 500;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .btn-outline-close {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 3px 12px;
            font-size: 0.7rem;
            border-radius: 30px;
        }
        .btn-outline-close:hover { background: #ef4444; color: white; }
        .modal-content-custom { background: var(--card-bg); backdrop-filter: blur(20px); border-radius: 20px; }
        
        footer {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(248, 248, 248, 0.9); backdrop-filter: blur(10px);
            color: #666; font-size: 0.65rem; z-index: 1000;
            border-top: 1px solid rgba(255,107,53,0.2);
            display: flex; justify-content: space-between; align-items: center;
            padding: 2px 12px; height: 28px;
        }
        [data-theme="dark"] footer { background: rgba(45,45,45,0.9); color: #ccc; }
        .theme-toggle-btn {
            background: transparent; border: 1px solid #ccc; border-radius: 20px;
            padding: 2px 8px; font-size: 0.7rem; cursor: pointer;
        }
        @media (max-width: 576px) {
            .page-container { padding-top: 110px; }
            .stat-value { font-size: 0.95rem; }
            .fd-amount { font-size: 1.25rem; }
            .interest-line { font-size: 0.7rem; }
            .stat-box { min-height: 60px; padding: 6px 4px; }
            .page-heading { font-size: 1.3rem; margin-bottom: 15px; }
        }
        .form-control-sm-custom { font-size: 0.8rem; padding: 4px 8px; }
        .modal-body label { font-size: 0.75rem; font-weight: 500; }
    </style>
</head>
<body>
    <img src="assets/head.png" alt="Header" class="header-image">
    <div class="container page-container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <!-- Heading -->
                <h2 class="page-heading"><i class="fas fa-piggy-bank me-2"></i>Fixed Deposits</h2>
                
                <!-- Summary Cards - three equal boxes: Total FD Amount, Accrued Interest (live), Total Earned Interest (closed) -->
                <div class="summary-card">
                    <div class="summary-stats">
                        <div class="stat-box"><div class="stat-label">Total FD Amount</div><div class="stat-value" id="totalFdAmount">₹0</div></div>
                        <div class="stat-box"><div class="stat-label">Accrued Interest</div><div class="stat-value" id="totalAccruedInterest">₹0</div></div>
                        <div class="stat-box"><div class="stat-label">Total Earned</div><div class="stat-value" id="totalInterestEarned">₹0</div></div>
                    </div>
                </div>

                <!-- FD List -->
                <div id="fdListContainer" class="fd-list">
                    <div class="text-center text-white-50 p-3 small">Loading...</div>
                </div>

                <!-- Admin Panel (hidden by default) -->
                <div id="adminPanel" style="display: none;" class="admin-actions">
                    <button id="addFdBtn" class="admin-btn-sm"><i class="fas fa-plus"></i> Add FD</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-text"><p>Powered by VTSoft 2026</p></div>
        <button id="themeToggle" class="theme-toggle-btn">🌞</button>
    </footer>

    <!-- Modal -->
    <div class="modal fade" id="fdModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content modal-content-custom">
                <div class="modal-header py-2"><h6 class="modal-title" id="modalTitle">FD</h6><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBWswawf9tpxNwVU0BaJ6FCwCvgcjUQXlA",
            authDomain: "shipyard-nagar.firebaseapp.com",
            projectId: "shipyard-nagar",
            storageBucket: "shipyard-nagar.firebasestorage.app",
            messagingSenderId: "552855824221",
            appId: "1:552855824221:web:f709da953077475be9eab4"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUserRole = null;
        let allFDs = [];
        let modalInstance = null;

        // Helper: days difference
        function getDaysDifference(startDateStr) {
            const start = new Date(startDateStr);
            const today = new Date();
            today.setHours(0,0,0,0);
            const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24));
            return diff >= 0 ? diff : 0;
        }

        // Calculate accrued interest for an active FD (simple interest)
        function calculateAccruedInterest(principal, ratePercent, startDateStr) {
            const days = getDaysDifference(startDateStr);
            if (days <= 0) return 0;
            return principal * (ratePercent / 100) * (days / 365);
        }

        // Render FD list and update summary (three boxes)
        async function renderFDs() {
            if (!allFDs.length) {
                document.getElementById('fdListContainer').innerHTML = `<div class="text-center text-white-50 p-3 small"><i class="fas fa-inbox"></i> No FDs</div>`;
                updateSummary();
                return;
            }
            const sorted = [...allFDs].sort((a,b) => new Date(b.startDate) - new Date(a.startDate));
            let html = '';
            let totalAccrued = 0;
            
            for (const fd of sorted) {
                const isClosed = fd.status === 'closed';
                const amount = fd.amount || 0;
                const rate = fd.interestRate || 0;
                const start = fd.startDate;
                const bank = fd.bankName || 'N/A';
                const tenure = fd.tenure || 'N/A';
                let interestHtml = '';
                if (!isClosed) {
                    const accrued = calculateAccruedInterest(amount, rate, start);
                    totalAccrued += accrued;
                    const days = getDaysDifference(start);
                    interestHtml = `<div class="interest-line"><i class="fas fa-plus-circle"></i> + ₹${accrued.toFixed(2)} interest (${days} days)</div>`;
                } else {
                    interestHtml = `<div class="interest-line" style="color:#6c757d;"><i class="fas fa-check-circle"></i> Closed | + ₹${(fd.closedInterest || 0).toFixed(2)} interest</div>`;
                }
                html += `
                    <div class="fd-card" data-fd-id="${fd.id}">
                        <div class="fd-amount">₹${amount.toLocaleString('en-IN')}</div>
                        ${interestHtml}
                        <div class="fd-meta">
                            <span><i class="fas fa-university"></i> ${bank}</span>
                            <span><i class="far fa-calendar-alt"></i> ${start}</span>
                            <span><i class="fas fa-percent"></i> ${rate}%</span>
                            <span><i class="far fa-clock"></i> ${tenure}</span>
                        </div>
                `;
                if (currentUserRole === 'admin' && !isClosed) {
                    html += `<div class="text-end mt-1"><button class="btn btn-outline-close close-fd-btn" data-id="${fd.id}">Close</button> <button class="admin-btn-sm edit-fd-btn" data-id="${fd.id}" style="padding:2px 12px;">Edit</button></div>`;
                } else if (currentUserRole === 'admin' && isClosed) {
                    html += `<div class="text-end mt-1"><span class="badge bg-secondary" style="font-size:0.6rem;">Closed on ${fd.closedDate || ''}</span></div>`;
                }
                html += `</div>`;
            }
            document.getElementById('fdListContainer').innerHTML = html;
            updateSummary(totalAccrued);
            
            if (currentUserRole === 'admin') {
                document.querySelectorAll('.close-fd-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => { e.stopPropagation(); openCloseModal(btn.dataset.id); });
                });
                document.querySelectorAll('.edit-fd-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => { e.stopPropagation(); openEditModal(btn.dataset.id); });
                });
            }
        }
        
        // Update three summary boxes: Total FD Amount (active only), Accrued Interest (active), Total Earned (closed)
        function updateSummary(accruedTotal = null) {
            let totalActiveAmount = 0;
            let totalClosedInterest = 0;
            let computedAccrued = 0;
            
            for (const fd of allFDs) {
                if (fd.status !== 'closed') {
                    totalActiveAmount += fd.amount || 0;
                    // compute accrued if not already passed
                    if (accruedTotal === null) {
                        computedAccrued += calculateAccruedInterest(fd.amount || 0, fd.interestRate || 0, fd.startDate);
                    }
                } else {
                    totalClosedInterest += fd.closedInterest || 0;
                }
            }
            const finalAccrued = (accruedTotal !== null) ? accruedTotal : computedAccrued;
            document.getElementById('totalFdAmount').innerHTML = `₹${totalActiveAmount.toLocaleString('en-IN')}`;
            document.getElementById('totalAccruedInterest').innerHTML = `₹${finalAccrued.toFixed(2)}`;
            document.getElementById('totalInterestEarned').innerHTML = `₹${totalClosedInterest.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2})}`;
        }

        async function loadFDs() {
            try {
                const snap = await db.collection('fd').orderBy('createdAt', 'desc').get();
                allFDs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderFDs();
            } catch(e) { console.error(e); }
        }

        // Add FD form
        function showAddModal() {
            document.getElementById('modalTitle').innerHTML = 'Add FD';
            document.getElementById('modalBody').innerHTML = `
                <form id="fdForm">
                    <div class="mb-2"><label>Bank Name</label><input type="text" class="form-control form-control-sm" id="bankName" required></div>
                    <div class="mb-2"><label>Amount (₹)</label><input type="number" class="form-control form-control-sm" id="amount" step="any" required></div>
                    <div class="mb-2"><label>Interest Rate (%)</label><input type="number" class="form-control form-control-sm" id="interestRate" step="0.01" required placeholder="e.g., 8.25"></div>
                    <div class="mb-2"><label>Start Date</label><input type="date" class="form-control form-control-sm" id="startDate" required></div>
                    <div class="mb-2"><label>Tenure</label><input type="text" class="form-control form-control-sm" id="tenure" placeholder="12 months"></div>
                    <button type="submit" class="btn btn-sm btn-success w-100 mt-2">Save</button>
                </form>
            `;
            modalInstance.show();
            document.getElementById('fdForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const bankName = document.getElementById('bankName').value.trim();
                const amount = parseFloat(document.getElementById('amount').value);
                const interestRate = parseFloat(document.getElementById('interestRate').value);
                const startDate = document.getElementById('startDate').value;
                const tenure = document.getElementById('tenure').value.trim() || 'Not specified';
                if (!bankName || isNaN(amount) || isNaN(interestRate) || !startDate) return alert("Fill all required");
                try {
                    await db.collection('fd').add({
                        bankName, amount, interestRate, startDate, tenure,
                        status: 'active', closedInterest: 0, closedDate: null,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    modalInstance.hide();
                    loadFDs();
                } catch(err) { alert(err.message); }
            });
        }

        async function openEditModal(fdId) {
            const fd = allFDs.find(f => f.id === fdId);
            if (!fd || fd.status === 'closed') { alert("Closed FD cannot be edited"); return; }
            document.getElementById('modalTitle').innerHTML = 'Edit FD';
            document.getElementById('modalBody').innerHTML = `
                <form id="editFdForm">
                    <div class="mb-2"><label>Bank Name</label><input type="text" class="form-control form-control-sm" id="editBankName" value="${fd.bankName || ''}" required></div>
                    <div class="mb-2"><label>Amount (₹)</label><input type="number" class="form-control form-control-sm" id="editAmount" step="any" value="${fd.amount}" required></div>
                    <div class="mb-2"><label>Interest Rate (%)</label><input type="number" class="form-control form-control-sm" id="editInterestRate" step="0.01" value="${fd.interestRate}" required></div>
                    <div class="mb-2"><label>Start Date</label><input type="date" class="form-control form-control-sm" id="editStartDate" value="${fd.startDate}" required></div>
                    <div class="mb-2"><label>Tenure</label><input type="text" class="form-control form-control-sm" id="editTenure" value="${fd.tenure || ''}"></div>
                    <button type="submit" class="btn btn-sm btn-primary w-100">Update</button>
                </form>
            `;
            modalInstance.show();
            document.getElementById('editFdForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const updateData = {
                    bankName: document.getElementById('editBankName').value.trim(),
                    amount: parseFloat(document.getElementById('editAmount').value),
                    interestRate: parseFloat(document.getElementById('editInterestRate').value),
                    startDate: document.getElementById('editStartDate').value,
                    tenure: document.getElementById('editTenure').value.trim()
                };
                if (isNaN(updateData.amount) || isNaN(updateData.interestRate)) return alert("Invalid numbers");
                await db.collection('fd').doc(fdId).update(updateData);
                modalInstance.hide();
                loadFDs();
            });
        }

        function openCloseModal(fdId) {
            const fd = allFDs.find(f => f.id === fdId);
            if (!fd) return;
            document.getElementById('modalTitle').innerHTML = 'Close FD';
            document.getElementById('modalBody').innerHTML = `
                <form id="closeFdForm">
                    <div class="mb-2"><label>FD Amount</label><input type="text" class="form-control form-control-sm" value="₹${fd.amount}" disabled></div>
                    <div class="mb-2"><label>Closing Date</label><input type="date" class="form-control form-control-sm" id="closeDate" required></div>
                    <div class="mb-2"><label>Interest Earned (₹)</label><input type="number" class="form-control form-control-sm" id="closeInterest" step="0.01" required placeholder="0.00"></div>
                    <div class="mb-2"><label>Maturity Amt</label><input type="text" class="form-control form-control-sm" id="totalPreview" readonly></div>
                    <button type="submit" class="btn btn-sm btn-danger w-100">Confirm Close</button>
                </form>
            `;
            modalInstance.show();
            const interestInp = document.getElementById('closeInterest');
            const preview = document.getElementById('totalPreview');
            const updatePreview = () => {
                let int = parseFloat(interestInp.value) || 0;
                preview.value = `₹${(fd.amount + int).toFixed(2)}`;
            };
            interestInp.addEventListener('input', updatePreview);
            document.getElementById('closeDate').addEventListener('change', updatePreview);
            document.getElementById('closeFdForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const closedDate = document.getElementById('closeDate').value;
                const closedInterest = parseFloat(document.getElementById('closeInterest').value);
                if (!closedDate || isNaN(closedInterest)) return alert("Enter valid details");
                await db.collection('fd').doc(fdId).update({
                    status: 'closed', closedDate, closedInterest,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                modalInstance.hide();
                loadFDs();
            });
        }

        // Auth
        auth.onAuthStateChanged((user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            db.collection('users').doc(user.uid).get().then(doc => {
                currentUserRole = doc.exists ? (doc.data().role || 'member') : 'member';
                if (currentUserRole === 'admin') document.getElementById('adminPanel').style.display = 'flex';
                else document.getElementById('adminPanel').style.display = 'none';
                loadFDs();
            }).catch(() => { currentUserRole = 'member'; loadFDs(); });
        });

        // Theme toggle
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const themeBtn = document.getElementById('themeToggle');
        themeBtn.textContent = savedTheme === 'light' ? '🌞' : '🌙';
        themeBtn.addEventListener('click', () => {
            const html = document.documentElement;
            const curr = html.getAttribute('data-theme');
            const newTheme = curr === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeBtn.textContent = newTheme === 'light' ? '🌞' : '🌙';
        });

        modalInstance = new bootstrap.Modal(document.getElementById('fdModal'), { backdrop: true });
        document.getElementById('addFdBtn').addEventListener('click', showAddModal);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(e=>console.log(e)));
        }
    </script>
</body>
</html>
