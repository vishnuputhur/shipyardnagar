<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipyard Nagar - FIFA Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- jsPDF for Admin PDF Download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --primary-orange: #FF6B35;
            --orange-light: #FF8C42;
            --orange-dark: #E55A2B;
            --gradient: linear-gradient(135deg, #FF6B35 0%, #FF8C42 50%, #FFA726 100%);
            --shadow: 0 8px 25px rgba(255, 107, 53, 0.15);
            --shadow-hover: 0 12px 35px rgba(255, 107, 53, 0.25);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        [data-theme="dark"] {
            --card-bg: rgba(45, 45, 45, 0.95);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-bottom: 60px;
            position: relative;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000"><polygon fill="%23ffffff10" points="0,1000 1000,0 1000,1000"/></svg>');
            pointer-events: none;
            z-index: -1;
        }

        .header-image {
            width: 100%;
            height: auto;
            max-height: 150px;
            object-fit: cover;
            display: block;
            position: fixed;
            top: 3mm;
            left: 0;
            z-index: 999;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 50px;
            position: relative;
            margin-top: 120px;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 10px;
            text-align: center;
        }

        [data-theme="dark"] .page-title { color: #60a5fa; }

        .admin-msg-box {
            background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
            font-size: 0.9rem;
            color: #856404;
            font-weight: 500;
        }
        [data-theme="dark"] .admin-msg-box {
            background: linear-gradient(135deg, #2c2512 0%, #443612 100%);
            border-left-color: #ffc107;
            color: #ffe0b2;
        }

        .form-label {
            font-weight: 600;
            margin-top: 12px;
            color: #333;
            font-size: 0.9rem;
        }
        [data-theme="dark"] .form-label { color: #fff; }

        .form-select, .form-control {
            border-radius: 10px;
            padding: 10px;
            font-size: 0.9rem;
        }
        [data-theme="dark"] .form-select, [data-theme="dark"] .form-control {
            background: #444; color: #fff; border-color: #555;
        }

        .action-btn {
            background: var(--gradient);
            border: none;
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
        }
        .action-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-hover); }

        .badge-info-custom {
            background: #e0f2fe; color: #0369a1;
            padding: 8px 12px; border-radius: 8px;
            font-weight: 500; font-size: 0.85rem;
            display: block; text-align: center; margin-bottom: 15px;
        }
        [data-theme="dark"] .badge-info-custom { background: #0c4a6e; color: #38bdf8; }

        .admin-section {
            border-top: 2px dashed var(--primary-orange);
            margin-top: 30px;
            padding-top: 20px;
        }

        .table-container { overflow-x: auto; border-radius: 12px; }

        footer {
            position: fixed;
            bottom: 0; width: 100%;
            background: rgba(248, 248, 248, 0.9);
            backdrop-filter: blur(10px);
            color: #666; font-size: 0.7rem; z-index: 1000;
            border-top: 1px solid rgba(255, 107, 53, 0.2);
            display: flex; justify-content: space-between; align-items: center;
            padding: 3px 15px; height: 30px;
        }
        [data-theme="dark"] footer { background: rgba(45, 45, 45, 0.9); color: #ccc; }

        .theme-toggle-btn {
            background: transparent; border: 1px solid #ccc; border-radius: 20px;
            padding: 4px 8px; color: #666; font-size: 0.75rem; cursor: pointer;
        }

        #loadingSpinner {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 1.5rem;
            color: #0288d1; z-index: 9999; background: rgba(255, 255, 255, 0.95);
            padding: 20px 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <img src="assets/head.png" alt="Header" class="header-image" onerror="this.style.display='none'">
    
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="main-card">
                    <div class="page-title">
                        🏆 World Cup Prediction Contest
                    </div>
                    
                    <!-- Announcement / Notice Board -->
                    <div class="no-payment-message mb-3" id="announcementBox" style="display: block; padding: 12px; border-radius: 12px; background: rgba(255, 107, 53, 0.1); border: 1px solid var(--primary-orange); text-align: center; font-size: 0.9rem; font-weight: 500;">
                        <i class="fas fa-bullhorn me-2 text-warning"></i> <span id="announcementText">Welcome to Predict & Win!</span>
                    </div>

                    <div id="countdownDisplay" class="text-center fw-bold text-danger mb-3 small"></div>

                    <!-- MEMBER VIEW: SUBMIT PREDICTION -->
                    <div id="memberPredictionSection" style="display: none;">
                        <span class="badge-info-custom" id="predictionStatusBadge">Loading status...</span>
                        
                        <form id="predictionForm">
                            <div class="form-group">
                                <label class="form-label">World Cup Champions (1st Place)</label>
                                <select class="form-select team-dropdown" id="winnerTeam" required></select>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Runners Up (2nd Place)</label>
                                <select class="form-select team-dropdown" id="runnerUpTeam" required></select>
                            </div>

                            <div class="row">
                                <div class="col-6 form-group">
                                    <label class="form-label">Semi-Finalist 3</label>
                                    <select class="form-select team-dropdown" id="semi3Team" required></select>
                                </div>
                                <div class="col-6 form-group">
                                    <label class="form-label">Semi-Finalist 4</label>
                                    <select class="form-select team-dropdown" id="semi4Team" required></select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Golden Boot Winner (Top Scorer Name)</label>
                                <input type="text" class="form-control" id="goldenBootPlayer" placeholder="Enter Player Name" required>
                            </div>

                            <button type="submit" class="action-btn" id="submitPredictionBtn">
                                <i class="fas fa-paper-plane me-2"></i> Submit Prediction
                            </button>
                        </form>
                    </div>

                    <!-- ADMIN VIEW: MANAGE CONTEST & VIEW ALL -->
                    <div id="adminPanelSection" class="admin-section" style="display: none;">
                        <h3 class="mb-3 text-primary fw-bold">⚙️ Admin Control Panel</h3>
                        
                        <!-- Configuration Controls -->
                        <div class="row g-2 mb-4 p-3 border rounded bg-light text-dark">
                            <div class="col-12 col-sm-6">
                                <label class="form-label mt-0">Contest Close Last Date & Time</label>
                                <input type="datetime-local" class="form-control" id="configLastDate">
                            </div>
                            <div class="col-12 col-sm-6">
                                <label class="form-label mt-0">Dashboard Message</label>
                                <input type="text" class="form-control" id="configMessage" placeholder="Enter flash message">
                            </div>
                            <div class="col-12 mt-3">
                                <button class="btn btn-success btn-sm w-100" id="saveConfigBtn">Update Settings</button>
                            </div>
                        </div>

                        <!-- Predictions Data Table -->
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4 class="fw-bold m-0" style="font-size: 1.1rem;">All Members Predictions</h4>
                            <button class="btn btn-outline-danger btn-sm" id="downloadPdfBtn">
                                <i class="fas fa-file-pdf me-1"></i> Download PDF
                            </button>
                        </div>

                        <div class="table-container bg-white text-dark p-2 border">
                            <table class="table table-striped table-sm text-center" id="predictionsAdminTable" style="font-size: 0.85rem;">
                                <thead>
                                    <tr>
                                        <th>M.No</th>
                                        <th>Name</th>
                                        <th>Winner</th>
                                        <th>Runner Up</th>
                                        <th>Semi 3</th>
                                        <th>Semi 4</th>
                                        <th>Golden Boot</th>
                                    </tr>
                                </thead>
                                <tbody id="predictionsAdminTableBody">
                                    <tr><td colspan="7">Loading records...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <footer>
        <div><p>Powered by VTSoft 2026</p></div>
        <button id="themeToggle" class="theme-toggle-btn">🌞</button>
    </footer>

    <div id="loadingSpinner">⏳ Loading Contest...</div>

    <!-- Firebase Core SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <script>
        // ✅ ACTIVE TEAMS IN NOKOUT STAGE (തീയതി പ്രകാരം മാറ്റി നൽകാം)
        const activeTeams = [
            "Argentina", "Brazil", "France", "England", 
            "Portugal", "Spain", "Germany", "Netherlands",
            "Morocco", "Croatia", "Italy", "Uruguay"
        ];

        // Firebase Sync
        auth = firebase.auth();
        const firestoreDb = firebase.firestore();

        let currentLoggedUser = null;
        let contestSettings = { lastDate: "", message: "Contest Live!" };
        let allUsersCachedMap = {};

        document.addEventListener('DOMContentLoaded', () => {
            const loadingSpinner = document.getElementById('loadingSpinner');
            
            // Populate Dropdowns with Active Teams
            document.querySelectorAll('.team-dropdown').forEach(dropdown => {
                dropdown.innerHTML = '<option value="">Select Team</option>' + 
                    activeTeams.map(t => `<option value="${t}">${t}</option>`).join('');
            });

            // Auth Control
            auth.onAuthStateChanged(async (user) => {
                if (!user) {
                    alert('Session expired. Redirecting to login...');
                    window.location.href = 'login.html';
                    return;
                }
                currentLoggedUser = user;
                loadingSpinner.style.display = 'block';

                try {
                    // 1. Load Contest Config
                    const configDoc = await firestoreDb.collection('prediction_config').doc('settings').get();
                    if (configDoc.exists) {
                        contestSettings = configDoc.data();
                        document.getElementById('announcementText').textContent = contestSettings.message || "";
                        document.getElementById('configLastDate').value = contestSettings.lastDate || "";
                        document.getElementById('configMessage').value = contestSettings.message || "";
                    }
                    startCountdownTimer(contestSettings.lastDate);

                    // 2. Access control check
                    const userDoc = await firestoreDb.collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        const userData = userDoc.data();
                        
                        if (userData.role === 'admin') {
                            // Display Admin Console + Live data
                            document.getElementById('adminPanelSection').style.display = 'block';
                            document.getElementById('memberPredictionSection').style.display = 'block'; // Admin can also check layout
                            await loadAdminPredictionsData();
                        } else {
                            // Member view logic
                            document.getElementById('memberPredictionSection').style.display = 'block';
                            checkExistingPrediction(user.uid, userData.memberNumber);
                        }
                    }
                } catch (e) {
                    console.error(e);
                } finally {
                    loadingSpinner.style.display = 'none';
                }
            });

            // Form Submit - Save Entry (One submission per Family Head restriction based on unique memberNumber)
            document.getElementById('predictionForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const isExpired = new Date() > new Date(contestSettings.lastDate);
                if (isExpired && contestSettings.lastDate) {
                    return alert('❌ Sorry! Prediction entry time has closed.');
                }

                loadingSpinner.style.display = 'block';
                try {
                    const uDoc = await firestoreDb.collection('users').doc(currentLoggedUser.uid).get();
                    const mNo = uDoc.data().memberNumber || "Unknown";
                    const mName = uDoc.data().memberName || "Anonymous";

                    const payload = {
                        memberId: currentLoggedUser.uid,
                        memberNumber: mNo,
                        memberName: mName,
                        winner: document.getElementById('winnerTeam').value,
                        runnerUp: document.getElementById('runnerUpTeam').value,
                        semi3: document.getElementById('semi3Team').value,
                        semi4: document.getElementById('semi4Team').value,
                        goldenBoot: document.getElementById('goldenBootPlayer').value.trim(),
                        timestamp: new Date().toISOString()
                    };

                    // Save directly targeting unique memberNumber to block family multiple entries
                    await firestoreDb.collection('prediction_entries').doc(mNo).set(payload);
                    alert('🎉 Success! Your prediction has been registered.');
                    window.location.reload();
                } catch (err) {
                    alert('Error: ' + err.message);
                } finally {
                    loadingSpinner.style.display = 'none';
                }
            });

            // Admin Save Settings
            document.getElementById('saveConfigBtn').addEventListener('click', async () => {
                const lDate = document.getElementById('configLastDate').value;
                const msgText = document.getElementById('configMessage').value;
                
                loadingSpinner.style.display = 'block';
                try {
                    await firestoreDb.collection('prediction_config').doc('settings').set({
                        lastDate: lDate,
                        message: msgText
                    });
                    alert('Settings updated successfully!');
                    window.location.reload();
                } catch (err) {
                    alert('Failed to save settings');
                } finally {
                    loadingSpinner.style.display = 'none';
                }
            });

            // Print PDF Layout
            document.getElementById('downloadPdfBtn').addEventListener('click', () => {
                window.downloadPredictionsPDF();
            });

            // Theme Management
            const themeToggle = document.getElementById('themeToggle');
            themeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                themeToggle.textContent = newTheme === 'light' ? '🌞' : '🌙';
            });
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            themeToggle.textContent = savedTheme === 'light' ? '🌞' : '🌙';
        });

        // Check if member already predicted
        async function checkExistingPrediction(uid, mNo) {
            if(!mNo) return;
            const entryDoc = await firestoreDb.collection('prediction_entries').doc(mNo).get();
            if (entryDoc.exists) {
                const data = entryDoc.data();
                document.getElementById('predictionStatusBadge').textContent = "✅ You have already submitted your prediction!";
                document.getElementById('predictionStatusBadge').className = "badge-info-custom bg-success text-white";
                
                // Prefill fields
                document.getElementById('winnerTeam').value = data.winner || "";
                document.getElementById('runnerUpTeam').value = data.runnerUp || "";
                document.getElementById('semi3Team').value = data.semi3 || "";
                document.getElementById('semi4Team').value = data.semi4 || "";
                document.getElementById('goldenBootPlayer').value = data.goldenBoot || "";
                
                // Disable submit if entry date expired or already submitted
                document.getElementById('submitPredictionBtn').disabled = true;
                document.getElementById('submitPredictionBtn').textContent = "Submission Locked";
            } else {
                document.getElementById('predictionStatusBadge').textContent = "📝 You haven't submitted your prediction yet.";
            }
        }

        // Live Countdown Timer
        function startCountdownTimer(dateString) {
            if(!dateString) return;
            const target = new Date(dateString).getTime();
            
            const timer = setInterval(() => {
                const now = new Date().getTime();
                const diff = target - now;
                
                if (diff <= 0) {
                    clearInterval(timer);
                    document.getElementById('countdownDisplay').textContent = "⚠️ Entries are officially Closed!";
                    document.getElementById('submitPredictionBtn').disabled = true;
                    return;
                }
                
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                
                document.getElementById('countdownDisplay').textContent = `⏳ Time Remaining: ${days}d ${hours}h ${mins}m`;
            }, 1000);
        }

        // Fetch All Predictions into Admin Row Grid (Optimized Run)
        let adminTableRowsData = [];
        async function loadAdminPredictionsData() {
            const tableBody = document.getElementById('predictionsAdminTableBody');
            try {
                const snap = await firestoreDb.collection('prediction_entries').get();
                tableBody.innerHTML = "";
                adminTableRowsData = [];

                if(snap.empty) {
                    tableBody.innerHTML = '<tr><td colspan="7">No entries found yet.</td></tr>';
                    return;
                }

                snap.forEach(doc => {
                    const d = doc.data();
                    adminTableRowsData.push(d);
                    tableBody.innerHTML += `
                        <tr>
                            <td><strong>${d.memberNumber}</strong></td>
                            <td>${d.memberName}</td>
                            <td class="text-success fw-bold">${d.winner}</td>
                            <td>${d.runnerUp}</td>
                            <td>${d.semi3}</td>
                            <td>${d.semi4}</td>
                            <td class="text-primary">${d.goldenBoot}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="7">Error matching records.</td></tr>';
            }
        }

        // Action Print PDF Output
        window.downloadPredictionsPDF = function() {
            if(adminTableRowsData.length === 0) return alert('No data available to print!');
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'letter'); // Landscape layout fits better
            const margin = 6;
            const pageWidth = doc.internal.pageSize.getWidth();
            
            doc.setDrawColor(135, 206, 235);
            doc.setLineWidth(0.5);
            doc.rect(margin, margin, pageWidth - 2 * margin, doc.internal.pageSize.getHeight() - 2 * margin);
            
            doc.setFontSize(22);
            doc.setTextColor(0, 0, 128);
            doc.setFont(undefined, 'bold');
            doc.text('Shipyard Nagar Residence Association', pageWidth / 2, 15, { align: 'center' });
            
            doc.setFontSize(13);
            doc.setTextColor(0, 0, 0);
            doc.text('World Cup Prediction Contest Log', pageWidth / 2, 23, { align: 'center' });

            const mappedBody = adminTableRowsData.map((d, i) => [
                (i+1).toString(), d.memberNumber, d.memberName, d.winner, d.runnerUp, d.semi3, d.semi4, d.goldenBoot
            ]);

            doc.autoTable({
                head: [['No.', 'M.No', 'Name', 'Winner (1st)', 'Runner Up (2nd)', 'Semi 3', 'Semi 4', 'Golden Boot']],
                body: mappedBody,
                startY: 30,
                styles: { font: 'times', fontSize: 9, halign: 'center' },
                headStyles: { fillColor: [173, 216, 230], textColor: 0, fontStyle: 'bold' }
            });

            doc.save(`FIFA_Predictions_Report.pdf`);
        }
    </script>
</body>
</html>
